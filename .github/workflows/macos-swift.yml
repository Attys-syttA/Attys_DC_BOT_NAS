name: macOS Swift Compile

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compile-menubar:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show Swift version
        run: swift --version

      - name: Compile macOS menu bar app
        run: xcrun swiftc menubar/CodexBotMenu.swift -o /tmp/CodexBotMenu -framework Cocoa
